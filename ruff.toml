[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "B",    # flake8-bugbear
  "S",    # flake8-bandit (security)
  "UP",   # pyupgrade
]
ignore = [
  "S101",  # allow assert in tests
  "E501",  # line length handled by formatter
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = ["S101"]
"**/test_*.py" = ["S101"]

[tool.ruff.format]
quote-style = "single"
