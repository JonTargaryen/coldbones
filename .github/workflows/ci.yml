# CI — runs on every push & PR to main and aws branches
name: CI

on:
  push:
    branches: [main, aws]
  pull_request:
    branches: [main, aws]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (TypeScript + Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ── Backend ──────────────────────────────────────────────────────────────
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m pytest --tb=short --cov --cov-report=xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ── Infrastructure ───────────────────────────────────────────────────────
  infrastructure:
    name: CDK (TypeScript + synth)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: infrastructure/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx jest --passWithNoTests
      - run: npx cdk synth --quiet
        env:
          # cdk synth needs an account/region even in CI
          CDK_DEFAULT_ACCOUNT: "000000000000"
          CDK_DEFAULT_REGION: us-east-1

  # ── Python lint ──────────────────────────────────────────────────────────
  lint-python:
    name: Ruff (lint + format check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check backend/ lambdas/ worker/
      - run: ruff format --check backend/ lambdas/ worker/

  # ── Deploy (only on push to aws branch) ──────────────────────────────────
  deploy:
    name: Deploy to AWS
    needs: [frontend, backend, infrastructure, lint-python]
    if: github.ref == 'refs/heads/aws' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - name: Deploy infrastructure
        working-directory: infrastructure
        run: |
          npm ci
          npx cdk deploy --all --require-approval never
      - name: Deploy frontend
        run: bash scripts/deploy-frontend.sh
